<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云运动守护系统 - 运行输出日志</title>
    <link href="/static/index.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .container { max-width: 1000px; }
        .log-table { width: 100%; border-collapse: collapse; }
        .log-table th, .log-table td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-table th { font-weight: 600; color: var(--text-secondary); }
        .log-table tr:hover { background: rgba(255,255,255,0.02); }
        .log-message { max-width: 500px; white-space: pre-wrap; font-family: monospace; line-height: 1.4; word-break: break-all; font-size: 13px; color: var(--text-secondary); background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin: 4px 0; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <svg /* ... omitted exact svg for brevity ... */ width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs><linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f46e5" /><stop offset="100%" stop-color="#7c3aed" /></linearGradient></defs>
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <span>云运动守护</span>
        </div>
        <nav class="nav-menu">
            <a href="/" class="nav-item">系统状态</a>
            <a href="/logs" class="nav-item active">运行输出日志</a>
        </nav>
        <div style="flex:1"></div>
        <div style="padding: 24px;">
            <a href="/logout" class="btn btn-ghost" style="width:100%; justify-content:center; color: var(--danger)">安全登出</a>
        </div>
    </div>

    <div class="main-content container">
        <header class="header">
            <div>
                <h1 style="font-size: 24px; font-weight: 700; background: linear-gradient(to right, #fff, #9ca3af); -webkit-background-clip: text; color: transparent;">运行输出日志</h1>
                <p style="color: var(--text-secondary); margin-top: 4px;">系统最近 500 条自动调度与交互日志记录。</p>
            </div>
            <a href="/" class="btn btn-ghost">返回首页</a>
        </header>

        <div class="glass-panel">
            <div class="table-responsive">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>执行账户</th>
                            <th>执行状态</th>
                            <th>记录内容</th>
                            <th>记录时间</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for log in logs %}
                        <tr>
                            <td><strong>{{ log.user.username }}</strong></td>
                            <td>
                                {% if log.status == 'Success' %}
                                <span class="badge badge-success">Success</span>
                                {% else %}
                                <span class="badge badge-error">Failed</span>
                                {% endif %}
                            </td>
                            <td class="log-message">{{ log.message }}</td>
                            <td class="log-time">{{ log.run_time.strftime('%Y-%m-%d %H:%M:%S') }}</td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4">
                                <div class="empty-state">尚未产生任何日志数据</div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
