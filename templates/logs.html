<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云运动控制台 - 运行输出日志</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg-color: #0f172a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background */
        .ambient-layer {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
            animation: float 20s infinite ease-in-out alternate;
        }

        .blob-1 { width: 600px; height: 600px; background: #3b82f6; top: -200px; left: -200px; }
        .blob-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -100px; right: 10%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(80px, 40px) scale(1.1); }
            100% { transform: translate(-40px, 80px) scale(0.9); }
        }

        /* Layout */
        .container {
            max-width: 1200px;
            height: 100vh;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            animation: fadeIn 0.5s ease;
        }

        .brand {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Header Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass Cards */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 30px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 500;
            color: #fff;
        }

        /* Forms & Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
        }

        .btn-ghost:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .badge-error { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

        /* Data Tables - Readjusted for premium fit */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 13px;
            padding: 16px;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-size: 14px;
            vertical-align: middle;
        }

        tr {
            transition: background 0.2s ease;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .log-time {
            color: var(--text-muted);
            font-size: 13px;
            white-space: nowrap;
        }

        .log-msg {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 6px;
            white-space: pre-wrap;
            font-family: monospace;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
            line-height: 1.5;
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 14px;
        }
        /* Switch CSS */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255,255,255,0.1);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--primary);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
    </style>
</head>
<body>
    <div class="ambient-layer">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary)">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                运行输出日志
            </div>
            <div style="display:flex; gap:12px;">
                <a href="/" class="btn btn-ghost" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main);">返回控制台</a>
            </div>
        </header>
        <div class="glass-panel" style="margin-top: 20px; flex: 1; display: flex; flex-direction: column; min-height: 0; padding: 20px;">
            <div class="panel-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                <div style="display:flex; gap:12px; align-items:center;">
                    <h2 class="panel-title">运行日志</h2>
                    <span class="badge badge-info" style="font-size: 11px; background: rgba(56, 189, 248, 0.1); color: #38bdf8; border: 1px solid rgba(56, 189, 248, 0.2);">实时更新</span>
                </div>
                <div style="display:flex; align-items:center; gap:8px;">
                    <span style="font-size:13px; color:var(--text-muted);">自动刷新</span>
                    <label class="switch">
                        <input type="checkbox" id="autoRefreshToggle" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            
            <div style="flex: 1; min-height: 0; display: flex; flex-direction: column; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);">
                <pre id="terminalOutput" style="flex: 1; height: 100%; font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; font-size: 13px; color: #e2e8f0; line-height: 1.6; margin: 0; white-space: pre-wrap; word-break: break-all; overflow-y: auto;">
等待系统运行日志输出...
                </pre>
            </div>
        </div>
    </div>

    <script>
        let refreshInterval = null;
        const terminalOut = document.getElementById('terminalOutput');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.innerText = text;
            return div.innerHTML;
        }

        async function fetchLogs() {
            try {
                const response = await fetch('/api/logs/stream');
                const result = await response.json();
                
                if (result.success && result.data) {
                    // 检查是否在底部
                    const isScrolledToBottom = terminalOut.scrollHeight - terminalOut.clientHeight <= terminalOut.scrollTop + 50;
                    
                    terminalOut.innerHTML = escapeHtml(result.data);
                    
                    if (isScrolledToBottom) {
                        terminalOut.scrollTop = terminalOut.scrollHeight;
                    }
                }
            } catch (e) {
                console.error("Failed to load logs stream:", e);
            }
        }

        // Initialize fetching
        fetchLogs();
        
        const toggle = document.getElementById('autoRefreshToggle');
        toggle.addEventListener('change', function() {
            if (this.checked) {
                fetchLogs(); // Fetch immediately on toggle
                refreshInterval = setInterval(fetchLogs, 2500);
            } else {
                clearInterval(refreshInterval);
            }
        });

        // Set initial interval
        refreshInterval = setInterval(fetchLogs, 2500);
    </script>
</body>
</html>
